      - name: Keep alive
        run: |
          echo "Server running at bore.pub:${{ env.PORT }}"
          while true; do
            if ! pgrep -f sing-box-bin > /dev/null; then
              echo "Sing-box died, restarting..."
              ./sing-box-bin run -c config.json &
            fi
            if ! pgrep -f bore > /dev/null; then
              echo "Bore died, restarting..."
              bore local 8880 --to bore.pub > bore.log 2>&1 &
              sleep 3
              NEW_PORT=$(grep -oP 'bore\.pub:\K[0-9]+' bore.log || echo "unknown")
              echo "New port: $NEW_PORT"
              echo "bore.pub:$NEW_PORT" > Current.txt
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add Current.txt
              git commit -m "Update port: $NEW_PORT" || true
              git push || true
            fi
            sleep 30
          done
